# ECMWF Open Data — Interactive Guide
# JupyterBook configuration
title: ECMWF Open Data — Interactive Guide
author: Valters Žeižis (ECMWF)
logo: https://www.ecmwf.int/sites/default/files/ECMWF_logo.png

only_build_toc_files: true

execute:
  execute_notebooks: "auto"
  timeout: 300
  exclude_patterns:
    - "C01_soff*"   # pre-run notebook, skip re-execution

parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath

html:
  use_repository_button: true
  use_issues_button: true
  home_page_in_navbar: false

repository:
  url: https://github.com/valtzen/ecmwf-open-data-guide
  branch: main
  path_to_book: book

sphinx:
  config:
    html_theme_options:
      navigation_with_keys: true
      show_toc_level: 2
